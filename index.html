<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FutebolFight — Arena de Combate</title>
    <meta name="description" content="FutebolFight: modalidade híbrida extrema de futebol e luta. Domine a arena!" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Outfit:wght@400;600;700;900&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet" />
    <style>
      :root {
        /* Background */
        --bg-main:      #080E17;
        --bg-secondary: #0C2857;
        /* Blues */
        --blue-primary:   #004DD6;
        --blue-secondary: #053991;
        --blue-glow:      #0C439F;
        /* Text */
        --white:      #F1F1F1;
        /* Neutral */
        --metal:      #55575C;
        --gray-blue:  #374459;
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: var(--bg-main);
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100vw;
        height: 100vh;
        font-family: 'Outfit', sans-serif;
      }
      #game-container {
        position: relative;
        width: 100vw;
        height: 100vh;
      }
      #game-container canvas {
        display: block;
        width: 100vw !important;
        height: 100vh !important;
        image-rendering: pixelated; /* Toque PS1 */
      }

      /* ─── HUD CSS (Futuristic Style) ─── */
      .hud-container {
        position: absolute;
        top: 30px;
        z-index: 100;
        display: none;
        flex-direction: column;
        gap: 8px;
        width: 380px;
        pointer-events: none;
        font-family: 'Bangers', cursive;
      }
      #hud-p1 { left: 40px; }
      #hud-p2 { right: 40px; text-align: right; }
      #hud-p2 .bar-wrapper { flex-direction: row-reverse; }

      .player-name {
        color: var(--white);
        font-weight: 900;
        font-size: 20px;
        font-family: 'Bangers', cursive;
        text-transform: uppercase;
        letter-spacing: 3px;
        margin-bottom: 4px;
        text-shadow: 0 0 12px rgba(0, 77, 214, 0.7);
      }
      #hud-p1 .player-name { color: #00ffff; }
      #hud-p2 .player-name { color: #ff3e3e; }

      .bar-wrapper {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .icon {
        font-size: 20px;
        filter: drop-shadow(0 0 5px currentColor);
      }

      .bar-container {
        flex: 1;
        height: 18px;
        background: rgba(8, 14, 23, 0.85);
        border: 2px solid var(--gray-blue);
        position: relative;
        transform: skewX(-15deg);
        overflow: hidden;
        box-shadow: 0 0 10px rgba(0, 77, 214, 0.3);
      }

      .bar-fill {
        height: 100%;
        width: 100%;
        transition: width 0.3s cubic-bezier(0.1, 0.7, 0.1, 1);
      }

      .health-bar .bar-fill {
        background: linear-gradient(90deg, #2ecc71, #27ae60);
        box-shadow: 0 0 15px rgba(46, 204, 113, 0.6);
      }
      .stamina-bar .bar-fill {
        background: linear-gradient(90deg, #f1c40f, #f39c12);
        box-shadow: 0 0 15px rgba(241, 196, 15, 0.6);
      }

      #hud-p1 .health-bar { border-color: #00ffff; box-shadow: 0 0 8px rgba(0,255,255,0.4); }
      #hud-p2 .health-bar { border-color: #ff3e3e; box-shadow: 0 0 8px rgba(255,62,62,0.4); }

      .bar-label {
        position: absolute;
        right: 10px;
        top: 50%;
        transform: translateY(-50%) skewX(15deg);
        font-size: 10px;
        font-weight: 900;
        color: #fff;
        text-shadow: 1px 1px 2px #000;
      }
      #hud-p2 .bar-label { left: 10px; right: auto; }

      /* ─── Match Scoreboard CSS (Hexagonal Style) ─── */
      .match-scoreboard {
        position: absolute;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 150;
        pointer-events: none;
        font-family: 'Bangers', cursive;
        filter: 
          drop-shadow(2px 0 0 #000) 
          drop-shadow(-2px 0 0 #000) 
          drop-shadow(0 2px 0 #000) 
          drop-shadow(0 -2px 0 #000)
          drop-shadow(0 4px 12px rgba(0, 77, 214, 0.5));
      }

      .team-box {
        background: var(--bg-secondary);
        height: 35px;
        display: flex;
        align-items: center;
        padding: 0 25px;
        color: var(--white);
        font-weight: 700;
        font-size: 13px;
        letter-spacing: 2px;
        position: relative;
        overflow: hidden;
      }

      .team-p1 {
        clip-path: polygon(15px 0%, 100% 0%, 100% 100%, 15px 100%, 0% 50%);
        background: linear-gradient(90deg, #660000, var(--bg-secondary));
        border-left: 2px solid #ff3e3e;
        margin-right: -15px;
      }

      .team-p2 {
        clip-path: polygon(0% 0%, calc(100% - 15px) 0%, 100% 50%, calc(100% - 15px) 100%, 0% 100%);
        background: linear-gradient(270deg, var(--blue-secondary), var(--bg-secondary));
        border-right: 2px solid #00ffff;
        margin-left: -15px;
      }

      .score-center {
        background: var(--bg-main);
        height: 48px;
        width: 100px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        clip-path: polygon(15% 0%, 85% 0%, 100% 50%, 85% 100%, 15% 100%, 0% 50%);
        border: 2px solid var(--gray-blue);
        position: relative;
        z-index: 5;
        box-shadow: inset 0 0 15px rgba(0, 77, 214, 0.2);
      }

      .score-display {
        font-size: 24px;
        font-weight: 900;
        color: #fff;
        display: flex;
        align-items: center;
        gap: 6px;
        line-height: 1;
        margin-top: 2px;
      }

      .score-value {
        min-width: 20px;
        text-align: center;
      }

      .score-dash {
        color: rgba(255, 255, 255, 0.4);
        font-size: 18px;
      }

      .game-timer {
        font-size: 9px;
        color: var(--blue-primary);
        margin-top: 1px;
        font-family: 'Bangers', cursive;
        letter-spacing: 2px;
      }

      #game-container::after {
        content: " ";
        display: block;
        position: absolute;
        top: 0; left: 0; bottom: 0; right: 0;
        background: linear-gradient(rgba(8, 14, 23, 0) 50%, rgba(0, 0, 0, 0.12) 50%), 
                    linear-gradient(90deg, rgba(0, 77, 214, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 77, 214, 0.03));
        z-index: 1000;
        background-size: 100% 4px, 3px 100%;
        pointer-events: none;
        opacity: 0.3;
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <div id="hud-p1" class="hud-container">
        <div class="player-name">Jogador 1</div>
        <div class="bar-wrapper">
          <span class="icon">❤️</span>
          <div class="bar-container health-bar">
            <div id="health-p1" class="bar-fill"></div>
            <span id="health-label-p1" class="bar-label">100%</span>
          </div>
        </div>
        <div class="bar-wrapper">
          <span class="icon">⚡</span>
          <div class="bar-container stamina-bar">
            <div id="stamina-p1" class="bar-fill"></div>
            <span id="stamina-label-p1" class="bar-label">100%</span>
          </div>
        </div>
      </div>

      <div id="match-scoreboard" class="match-scoreboard">
        <div class="team-box team-p1">JOGADOR 1</div>
        <div class="score-center">
          <div class="score-display">
            <span id="score-p1" class="score-value">0</span>
            <span class="score-dash">-</span>
            <span id="score-p2" class="score-value">0</span>
          </div>
          <div id="game-timer" class="game-timer">02:00</div>
        </div>
        <div class="team-box team-p2">CPU / P2</div>
      </div>

      <div id="hud-p2" class="hud-container">
        <div class="player-name">CPU / Jogador 2</div>
        <div class="bar-wrapper">
          <span class="icon">❤️</span>
          <div class="bar-container health-bar">
            <div id="health-p2" class="bar-fill"></div>
            <span id="health-label-p2" class="bar-label">100%</span>
          </div>
        </div>
        <div class="bar-wrapper">
          <span class="icon">⚡</span>
          <div class="bar-container stamina-bar">
            <div id="stamina-p2" class="bar-fill"></div>
            <span id="stamina-label-p2" class="bar-label">100%</span>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
