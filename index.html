<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FutebolFight — Arena de Combate</title>
    <meta name="description" content="FutebolFight: modalidade híbrida extrema de futebol e luta. Domine a arena!" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #000;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100vw;
        height: 100vh;
        font-family: 'Outfit', sans-serif;
      }
      #game-container {
        position: relative;
        width: 100vw;
        height: 100vh;
      }
      #game-container canvas {
        display: block;
        width: 100vw !important;
        height: 100vh !important;
        image-rendering: pixelated; /* Toque PS1 */
      }

      /* ─── HUD CSS (PS1 Style) ─── */
      .hud-container {
        position: absolute;
        top: 30px;
        z-index: 100;
        display: none;
        flex-direction: column;
        gap: 12px;
        width: 420px;
        pointer-events: none;
        padding: 10px;
      }
      #hud-p1 { left: 30px; }
      #hud-p2 { right: 30px; text-align: right; }
      #hud-p2 .bar-wrapper { flex-direction: row-reverse; }

      .player-name {
        color: #fff;
        font-weight: 900;
        font-family: 'Orbitron', sans-serif;
        font-size: 20px;
        text-transform: uppercase;
        letter-spacing: 3px;
        margin-bottom: 8px;
        text-shadow: 2px 2px 0px #000;
      }

      .bar-wrapper {
        display: flex;
        align-items: center;
        gap: 15px;
      }

      .icon {
        font-size: 28px;
        filter: drop-shadow(2px 2px 0px #000);
      }

      .bar-container {
        flex: 1;
        height: 24px;
        background: #000;
        border: 3px solid #fff;
        position: relative;
      }

      .bar-fill {
        height: 100%;
        width: 100%;
        transition: width 0.1s;
      }

      .health-bar .bar-fill {
        background: #2ecc71;
        box-shadow: inset 0 -4px 0 rgba(0,0,0,0.3);
      }
      .stamina-bar .bar-fill {
        background: #8d6e63;
        box-shadow: inset 0 -4px 0 rgba(0,0,0,0.3);
      }
      #hud-p2 .stamina-bar .bar-fill {
        background: #d35400;
        box-shadow: inset 0 -4px 0 rgba(0,0,0,0.3);
      }

      .bar-label {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 14px;
        font-weight: 900;
        color: #fff;
        font-family: 'Orbitron', sans-serif;
        text-shadow: 2px 2px 0px #000;
      }
      #hud-p2 .bar-label { left: 12px; right: auto; }

      #game-container::after {
        content: " ";
        display: block;
        position: absolute;
        top: 0; left: 0; bottom: 0; right: 0;
        background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                    linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
        z-index: 1000;
        background-size: 100% 4px, 3px 100%;
        pointer-events: none;
        opacity: 0.3;
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <div id="hud-p1" class="hud-container">
        <div class="player-name">Jogador 1</div>
        <div class="bar-wrapper">
          <span class="icon">❤️</span>
          <div class="bar-container health-bar">
            <div id="health-p1" class="bar-fill"></div>
            <span id="health-label-p1" class="bar-label">100%</span>
          </div>
        </div>
        <div class="bar-wrapper">
          <span class="icon">⚡</span>
          <div class="bar-container stamina-bar">
            <div id="stamina-p1" class="bar-fill"></div>
            <span id="stamina-label-p1" class="bar-label">100%</span>
          </div>
        </div>
      </div>

      <div id="hud-p2" class="hud-container">
        <div class="player-name">CPU / Jogador 2</div>
        <div class="bar-wrapper">
          <span class="icon">❤️</span>
          <div class="bar-container health-bar">
            <div id="health-p2" class="bar-fill"></div>
            <span id="health-label-p2" class="bar-label">100%</span>
          </div>
        </div>
        <div class="bar-wrapper">
          <span class="icon">⚡</span>
          <div class="bar-container stamina-bar">
            <div id="stamina-p2" class="bar-fill"></div>
            <span id="stamina-label-p2" class="bar-label">100%</span>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
